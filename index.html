<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quant Engine // Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        :root {
            --bg-terminal: #070a12;
            --bg-surface: #0c1220;
            --bg-surface-hover: #141d33;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-glow: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --bullish-glow: rgba(34, 197, 94, 0.1);
            --bullish-text: #4ade80;
            --neutral-glow: rgba(234, 179, 8, 0.08);
            --neutral-text: #fde047;
            --bearish-glow: rgba(239, 68, 68, 0.1);
            --bearish-text: #f87171;
            --stagnant-glow: rgba(148, 163, 184, 0.08);
            --stagnant-text: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-terminal); 
            color: var(--text-primary); 
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding: 3rem 2rem; 
            display: flex; 
            justify-content: center; 
            letter-spacing: -0.01em;
        }
        .terminal-frame { width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 2rem; }
        .terminal-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border-glow); padding-bottom: 1.25rem; }
        .title-area h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.05em; color: var(--text-primary); display: flex; align-items: center; gap: 0.6rem; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }
        .title-area p { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
        .status-badge { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--bullish-text); background: var(--bullish-glow); padding: 0.35rem 0.75rem; border-radius: 4px; border: 1px solid rgba(74, 222, 128, 0.2); font-weight: 700; text-transform: uppercase; }
        .table-container { background-color: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 6px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .matrix-table { width: 100%; border-collapse: collapse; text-align: left; }
        .matrix-table th { background-color: rgba(0, 0, 0, 0.2); padding: 1rem 1.25rem; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-secondary); border-bottom: 1px solid var(--border-glow); letter-spacing: 0.03em; }
        .matrix-table td { padding: 1rem 1.25rem; font-size: 0.85rem; border-bottom: 1px solid var(--border-subtle); vertical-align: middle; }
        .matrix-table tbody tr:hover { background-color: var(--bg-surface-hover); }
        .ticker-identity { display: flex; flex-direction: column; gap: 0.15rem; }
        .ticker-cell { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.95rem; color: var(--text-primary); }
        .company-name { color: var(--text-secondary); font-size: 0.75rem; font-weight: 400; }
        .badge { display: inline-flex; align-items: center; justify-content: center; padding: 0.35rem 0.6rem; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.8rem; min-width: 48px; }
        .badge.green { background-color: var(--bullish-glow); color: var(--bullish-text); border: 1px solid rgba(74, 222, 128, 0.15); }
        .badge.yellow { background-color: var(--neutral-glow); color: var(--neutral-text); border: 1px solid rgba(253, 224, 71, 0.15); }
        .badge.red { background-color: var(--bearish-glow); color: var(--bearish-text); border: 1px solid rgba(248, 113, 113, 0.15); }
        .badge.neutral { background-color: var(--stagnant-glow); color: var(--stagnant-text); border: 1px solid rgba(148, 163, 184, 0.15); }
        .price-text { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--text-primary); }
        .high52-sub { display: block; font-size: 0.7rem; color: var(--text-secondary); margin-top: 0.15rem; }
        .loading { text-align: center; padding: 5rem; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; letter-spacing: 0.05em; }
    </style>
</head>
<body>

<div class="terminal-frame">
    <div class="terminal-header">
        <div class="title-area">
            <h1><i data-lucide="terminal" style="color:var(--bullish-text); width:16px; height:16px; stroke-width:2.5px;"></i> Quant.Engine // Matrix_v1.0</h1>
            <p>Automated Index Component Quantitative Assessment Models</p>
        </div>
        <div class="status-container">
            <div id="status-badge" class="status-badge">Connecting Node...</div>
        </div>
    </div>

    <div class="table-container">
        <table class="matrix-table">
            <thead>
                <tr>
                    <th>Asset Target</th>
                    <th>Final Composite</th>
                    <th>Historic Quality</th>
                    <th>Execution Timing</th>
                    <th>Milestone Growth</th>
                    <th>Spot Execution Price</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="6" class="loading">CONNECTING TO CLOUD DATA NODE...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://oczkxudrukyotgmpvpdv.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_rKa-z8ZCJ76o2AsUqpGHHg_jAQJ74qN";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function formatNum(val, decimals = 1) {
        if (val === undefined || val === null || val === "N/A" || val === "None" || val === "") return "N/A";
        const parsed = parseFloat(val);
        return isNaN(parsed) ? val : parsed.toFixed(decimals);
    }

    function getScoreClass(val, maxScale = 10) {
        if (val === "N/A" || !val || val === "None" || val === "") return "neutral";
        const num = parseFloat(val);
        if (isNaN(num)) return "neutral";
        if (maxScale === 5) {
            if (num >= 4.0) return "green";
            if (num <= 2.0) return "red";
            return "neutral";
        }
        if (num >= 7.5) return "green";
        if (num >= 5.0) return "yellow";
        return "red";
    }

    async function fetchQuantData() {
        console.log("Starting data fetch sequence...");
        let { data: stock_analysis, error } = await supabaseClient
            .from('stock_analysis')
            .select('*');

        if (error) {
            console.error("Database connection error object:", error);
            document.getElementById('table-body').innerHTML = `<tr><td colspan="6" class="loading" style="color:var(--bearish-text);">DATABASE ERROR: ${error.message} (Code: ${error.code})</td></tr>`;
            return;
        }

        if (!stock_analysis || stock_analysis.length === 0) {
            console.log("Connected successfully, but table 'stock_analysis' returned 0 records.");
            document.getElementById('table-body').innerHTML = `<tr><td colspan="6" class="loading">CONNECTED // NO COMPONENT DATA DETECTED IN TABLE</td></tr>`;
            document.getElementById('status-badge').innerHTML = `● MATRIX EMPTY`;
            return;
        }

        console.log(`Successfully fetched ${stock_analysis.length} rows.`);
        stock_analysis.sort((a, b) => parseFloat(b.final_score || 0) - parseFloat(a.final_score || 0));

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = ""; 
        
        stock_analysis.forEach(stock => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div class="ticker-identity">
                        <div class="ticker-cell">${stock.ticker || '---'}</div>
                        <div class="company-name">${stock.stock_name || 'Unknown Asset'}</div>
                    </div>
                </td>
                <td><span class="badge ${getScoreClass(stock.final_score, 10)}">${formatNum(stock.final_score, 1)}</span></td>
                <td><span class="badge ${getScoreClass(stock.quality_score, 5)}">${formatNum(stock.quality_score, 1)}</span></td>
                <td><span class="badge ${getScoreClass(stock.invest_score, 10)}">${formatNum(stock.invest_score, 1)}</span></td>
                <td><span class="badge ${getScoreClass(stock.growth_score, 5)}">${formatNum(stock.growth_score, 1)}</span></td>
                <td>
                    <div class="price-text">$${formatNum(stock.stock_price, 2)}</div>
                    <span class="high52-sub">52W High: $${formatNum(stock.high_52w, 2)}</span>
                </td>
            `;
            tbody.appendChild(tr);
        });
        
        document.getElementById('status-badge').innerHTML = `● TERMINAL LIVE // ${stock_analysis.length} TARGETS DETECTED`;
        if (window.lucide) lucide.createIcons();
    }

    // Run layout execution loop immediately on load
    window.onload = fetchQuantData;
</script>
</body>
</html>
